# Single-node Kafka in KRaft mode, for demo purposes only -- see README "Known simplifications"
# for why a real deployment would want a managed/multi-broker Kafka instead. Storage is ephemeral
# (no PVC), matching docker-compose.yml's own kafka service, which is also volume-less: losing the
# pod loses in-flight (unpublished/unconsumed) messages, which is acceptable here since every
# publisher (OutboxPublisherService) and consumer (NotificationsConsumerService) already tolerates
# redelivery and retries by design (see CLAUDE.md convention 11).
#
# Only one listener is needed here (unlike docker-compose.yml's dual PLAINTEXT/PLAINTEXT_HOST
# listeners) -- nothing outside the cluster needs to reach this broker directly, only the backend
# Pod via the "kafka" Service DNS name.
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: flowpay
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: flowpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            # localhost, not the "kafka" Service name: a k8s Service only forwards ports it
            # declares (unlike docker-compose's network aliases, which forward every port), and
            # 9093 is controller-only traffic this single combined broker+controller pod sends to
            # itself -- it deliberately isn't in the Service above.
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: CLUSTER_ID
              value: "4L6g3nShT-eMCtK--X86sw"
          readinessProbe:
            exec:
              command: ["/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
            initialDelaySeconds: 20
            periodSeconds: 10
            # kafka-broker-api-versions.sh boots its own short-lived JVM per invocation -- the
            # default 1s exec-probe timeout isn't enough for that JVM to even start, let alone
            # complete the admin call, so every invocation times out (not fails on merit).
            # Caught by actually running this against minikube, not by reading the manifest.
            timeoutSeconds: 10
            failureThreshold: 9
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
