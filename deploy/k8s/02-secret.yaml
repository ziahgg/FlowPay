# EXAMPLE VALUES ONLY -- never commit real secrets to a manifest like this. In a real deployment,
# generate this Secret out-of-band (kubectl create secret, a sealed-secrets/external-secrets
# operator, or your cloud provider's secret manager) instead of checking values into git at all.
# stringData (not data) is used so these example values are readable in plain text here; Kubernetes
# base64-encodes them automatically when the object is created.
apiVersion: v1
kind: Secret
metadata:
  name: flowpay-backend-secret
  namespace: flowpay
type: Opaque
stringData:
  JWT_SECRET: "changeme-generate-a-real-random-32-plus-char-secret"
  DB_PASSWORD: "flowpay"
  SEED_ADMIN_PASSWORD: "ChangeMe123!"
