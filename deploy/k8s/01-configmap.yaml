# Non-secret backend configuration -- see 02-secret.yaml for the sensitive counterpart
# (JWT_SECRET, DB_PASSWORD, SEED_ADMIN_PASSWORD). Keys here mirror backend/src/common/config/
# env.schema.ts exactly (minus the secret ones), so a schema change should update both this file
# and 02-secret.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: flowpay-backend-config
  namespace: flowpay
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USERNAME: "flowpay"
  DB_NAME: "flowpay"
  JWT_EXPIRES_IN: "15m"
  DEPOSIT_MAX_AMOUNT: "50000"
  TRANSFER_FEE_FLAT: "0"
  IDEMPOTENCY_STALE_MS: "30000"
  FX_SPREAD_BPS: "50"
  RATE_CACHE_TTL_MS: "30000"
  KAFKA_BROKERS: "kafka:9092"
  KAFKA_CLIENT_ID: "flowpay-backend"
  NOTIFICATIONS_CONSUMER_GROUP_ID: "flowpay-notifications"
  SMTP_HOST: "mailhog"
  SMTP_PORT: "1025"
  MAIL_FROM: "no-reply@flowpay.dev"
  CORS_ORIGIN: "http://localhost:4200"
