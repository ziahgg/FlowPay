# Dev-only SMTP catcher, exactly like docker-compose.yml's mailhog service -- notifications/ sends
# every "email" here instead of anywhere real. No PVC: message history doesn't need to survive a
# pod restart for a demo.
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: flowpay
spec:
  selector:
    app: mailhog
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: web
      port: 8025
      targetPort: 8025
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: flowpay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog
          ports:
            - containerPort: 1025
            - containerPort: 8025
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
