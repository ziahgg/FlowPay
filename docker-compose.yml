services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowpay
      POSTGRES_PASSWORD: flowpay
      POSTGRES_DB: flowpay
    ports:
      - "5432:5432"
    volumes:
      - flowpay_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpay -d flowpay"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: info
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: flowpay
      DB_PASSWORD: flowpay
      DB_NAME: flowpay
      JWT_SECRET: dev-only-insecure-secret-change-me-please-32chars
      JWT_EXPIRES_IN: 15m
      SEED_ADMIN_PASSWORD: ChangeMe123!
      DEPOSIT_MAX_AMOUNT: 50000
      TRANSFER_FEE_FLAT: 0
      IDEMPOTENCY_STALE_MS: 30000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev

volumes:
  flowpay_postgres_data:
