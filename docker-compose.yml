services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowpay
      POSTGRES_PASSWORD: flowpay
      POSTGRES_DB: flowpay
    ports:
      - "5432:5432"
    volumes:
      - flowpay_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpay -d flowpay"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Single-node Kafka in KRaft mode (no Zookeeper). Two listeners on purpose: PLAINTEXT
  # (kafka:29092) for other containers on this network, PLAINTEXT_HOST (localhost:9092) for a
  # backend running natively on the host during `npm run start:dev` -- mirrors how Postgres is
  # reachable both ways today.
  kafka:
    image: apache/kafka:3.9.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:29093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  # Dev-only SMTP catcher for the notifications module -- no real email is ever sent. Web UI at
  # http://localhost:8025 to see what the app would have emailed.
  mailhog:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: info
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: flowpay
      DB_PASSWORD: flowpay
      DB_NAME: flowpay
      JWT_SECRET: dev-only-insecure-secret-change-me-please-32chars
      JWT_EXPIRES_IN: 15m
      SEED_ADMIN_PASSWORD: ChangeMe123!
      DEPOSIT_MAX_AMOUNT: 50000
      TRANSFER_FEE_FLAT: 0
      IDEMPOTENCY_STALE_MS: 30000
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: flowpay-backend
      NOTIFICATIONS_CONSUMER_GROUP_ID: flowpay-notifications
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      MAIL_FROM: no-reply@flowpay.dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:3000
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "start", "--", "--host", "0.0.0.0", "--port", "4200"]

volumes:
  flowpay_postgres_data:
